<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- Theme color (light + dark) -->
<meta name="theme-color" content="#1E3A5F" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1419" media="(prefers-color-scheme: dark)">

<!-- PWA basics -->
<meta name="description" content="أكاديمية الخطوط الكهربائية الأرضية — تطبيق تعليمي تفاعلي لمهندسي SEC">
<meta name="application-name" content="UGC Academy">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UGC">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Android / Chrome PWA -->
<meta name="mobile-web-app-capable" content="yes">

<!-- Manifest + Favicons -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/webp" href="favicon.webp">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<title>UGC Academy — أكاديمية الخطوط الكهربائية الأرضية</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===== Splash Screen ===== -->
<div id="splash-screen" class="splash-screen" aria-hidden="true">
  <div class="splash-content">
    <div class="splash-logo-wrap">
      <img src="icon-512.png" alt="UGC Academy" class="splash-logo">
    </div>
    <h1 class="splash-title">UGC Academy</h1>
    <p class="splash-subtitle">أكاديمية الخطوط الكهربائية الأرضية</p>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>
</div>

<!-- ===== App ===== -->
<div class="app-container">

  <!-- All Pages -->
  <div id="page-home" class="page active"></div>
  <div id="page-modules" class="page"></div>
  <div id="page-module-detail" class="page"></div>
  <div id="page-lesson" class="page"></div>
  <div id="page-library" class="page"></div>
  <div id="page-category" class="page"></div>
  <div id="page-topic" class="page"></div>
  <div id="page-image-detail" class="page"></div>
  <div id="page-tools" class="page"></div>
  <div id="page-calculator" class="page"></div>
  <div id="page-glossary" class="page"></div>
  <div id="page-bookmarks" class="page"></div>
  <div id="page-settings" class="page"></div>
  <div id="page-decision-trees" class="page"></div>
  <div id="page-decision-tree" class="page fullscreen"></div>
  <div id="page-red-flags" class="page"></div>
  <div id="page-templates" class="page"></div>
  <div id="page-emergency" class="page"></div>
  <div id="page-gap-analysis" class="page"></div>
  <div id="page-quiz-question" class="page fullscreen"></div>
  <div id="page-search" class="page"></div>
  <div id="page-onboarding" class="page fullscreen"></div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="goTo('home')">
      <i data-lucide="home"></i><span>الرئيسية</span>
    </button>
    <button class="nav-item" data-nav="modules" onclick="goTo('modules')">
      <i data-lucide="book-open"></i><span>الموديولات</span>
    </button>
    <button class="nav-item" data-nav="library" onclick="goTo('library')">
      <i data-lucide="library"></i><span>المكتبة</span>
    </button>
    <button class="nav-item" data-nav="tools" onclick="goTo('tools')">
      <i data-lucide="calculator"></i><span>الأدوات</span>
    </button>
    <button class="nav-item" data-nav="settings" onclick="goTo('settings')">
      <i data-lucide="user"></i><span>حسابي</span>
    </button>
  </nav>

</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- Modal -->
<div id="modal-backdrop" class="modal-backdrop" onclick="if(event.target===this)hideModal()">
  <div id="modal-content" class="modal"></div>
</div>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- App Scripts -->
<script src="content.js"></script>
<script src="media.js"></script>
<script src="app.js"></script>

<!-- Boot -->
<script>
  // Initialize icons on load
  window.addEventListener('load', () => {
    if (window.lucide) lucide.createIcons({ nameAttr: 'data-lucide' });
  });

  // Hide splash after app boots
  window.addEventListener('load', () => {
    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('splash-hide');
        setTimeout(() => { if (splash) splash.remove(); }, 400);
      }
    }, 1800);
  });

  // Register Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('[SW] registered:', reg.scope))
        .catch(err => console.warn('[SW] registration failed:', err));
    });
  }
</script>

</body>
</html>
