<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E3A5F">
<title>UGC Academy — أكاديمية الخطوط الكهربائية الأرضية</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-container">

  <!-- All Pages -->
  <div id="page-home" class="page active"></div>
  <div id="page-modules" class="page"></div>
  <div id="page-module-detail" class="page"></div>
  <div id="page-lesson" class="page"></div>
  <div id="page-library" class="page"></div>
  <div id="page-category" class="page"></div>
  <div id="page-topic" class="page"></div>
    <div id="page-image-detail" class="page"></div>
  <div id="page-tools" class="page"></div>
  <div id="page-calculator" class="page"></div>
  <div id="page-glossary" class="page"></div>
  <div id="page-bookmarks" class="page"></div>
  <div id="page-settings" class="page"></div>
  <div id="page-decision-trees" class="page"></div>
  <div id="page-decision-tree" class="page fullscreen"></div>
  <div id="page-red-flags" class="page"></div>
  <div id="page-templates" class="page"></div>
  <div id="page-emergency" class="page"></div>
  <div id="page-gap-analysis" class="page"></div>
  <div id="page-quiz-question" class="page fullscreen"></div>
  <div id="page-search" class="page"></div>
  <div id="page-onboarding" class="page fullscreen"></div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="goTo('home')">
      <i data-lucide="home"></i><span>الرئيسية</span>
    </button>
    <button class="nav-item" data-nav="modules" onclick="goTo('modules')">
      <i data-lucide="book-open"></i><span>الموديولات</span>
    </button>
    <button class="nav-item" data-nav="library" onclick="goTo('library')">
      <i data-lucide="library"></i><span>المكتبة</span>
    </button>
    <button class="nav-item" data-nav="tools" onclick="goTo('tools')">
      <i data-lucide="calculator"></i><span>الأدوات</span>
    </button>
    <button class="nav-item" data-nav="settings" onclick="goTo('settings')">
      <i data-lucide="user"></i><span>حسابي</span>
    </button>
  </nav>

</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- Modal -->
<div id="modal-backdrop" class="modal-backdrop" onclick="if(event.target===this)hideModal()">
  <div id="modal-content" class="modal"></div>
</div>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- App Scripts -->
<script src="content.js"></script>
<script src="media.js"></script>
<script src="app.js"></script>

<script>
  // Initialize icons on load
  window.addEventListener('load', () => { if(window.lucide) lucide.createIcons({ nameAttr: 'data-lucide' }); });
</script>

</body>
</html>
